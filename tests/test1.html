<!DOCTYPE html>
<html>

<head>
    <title>Add Product</title>
</head>

<body>

    <button id="show-form-btn">
        Add Product
    </button>

    <div id="product-form" style="display:none; margin-top:20px;">

        <input type="text" id="name" placeholder="Product Name">

        <br><br>

        <input type="number" id="price" placeholder="Price">

        <br><br>

        <input type="text" id="image" placeholder="Image URL">

        <br><br>

        <button id="save-btn">
            Save Product
        </button>

    </div>

    <hr>

    <h2>Products</h2>

    <div id="products-container"></div>

    <script type="module">

        import { db }
            from "./firebase-config.js";

        import {
            collection,
            addDoc,
            getDocs
        }
            from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        document
            .getElementById("show-form-btn")
            .onclick = function () {

                const form =
                    document.getElementById(
                        "product-form"
                    );

                if (form.style.display === "none") {

                    form.style.display =
                        "block";

                } else {

                    form.style.display =
                        "none";

                }
            };

        async function loadProducts() {

            const snapshot =
                await getDocs(collection(db, "products"));

            const container =
                document.getElementById("products-container");

            container.innerHTML = "";

            snapshot.forEach((docSnap) => {

                const product = docSnap.data();

                container.innerHTML += `

        <div class="product-card">

            <img
                src="${product.image}"
                width="120"
            >

            <h3>${product.name}</h3>

            <p>$${product.price}</p>

            <div class="quantity-box">

                <button
                    onclick="decrease('qty-${docSnap.id}')"
                >
                    −
                </button>

                <input
                    id="qty-${docSnap.id}"
                    type="number"
                    value="1"
                    min="1"
                >

                <button
                    onclick="increase('qty-${docSnap.id}')"
                >
                    +
                </button>

            </div>

            <br>

            <button
                onclick="
                addToCart(
                    '${product.name}',
                    ${product.price},
                    Number(
                        document.getElementById(
                            'qty-${docSnap.id}'
                        ).value
                    )
                )
                "
            >
                Add To Cart
            </button>

        </div>

        <hr>
        `;
            });
        }



        document
            .getElementById("save-btn")
            .onclick = async function () {

                const name =
                    document.getElementById(
                        "name"
                    ).value;

                const price =
                    Number(
                        document.getElementById(
                            "price"
                        ).value
                    );

                const image =
                    document.getElementById(
                        "image"
                    ).value;

                await addDoc(
                    collection(db, "products"),
                    {
                        name,
                        price,
                        image
                    }
                );

                alert(
                    "Product added!"
                );

                loadProducts();
            };
        loadProducts();


    </script>

    <script>
        function increase(id) {

            const input =
                document.getElementById(id);

            input.value =
                Number(input.value) + 1;
        }

        function decrease(id) {

            const input =
                document.getElementById(id);

            if (Number(input.value) > 1) {

                input.value =
                    Number(input.value) - 1;
            }
        }

    </script>
</body>

</html>
